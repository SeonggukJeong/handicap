syntax = "proto3";
package handicap.coordinator.v1;

// Single bidi stream:
//   Worker  --> Register, MetricBatch, RunStatus
//   Server  --> RunAssignment, AbortRun, Pong
service Coordinator {
  rpc Channel(stream WorkerMessage) returns (stream ServerMessage);
}

// ---------- Worker → Server ----------

message WorkerMessage {
  oneof payload {
    Register register = 1;
    Pong pong = 2;
    MetricBatch metric_batch = 3;
    RunStatus run_status = 4;
  }
}

message Register {
  string worker_id = 1;
  string run_id = 2;        // worker is spawned per-run in slice 1; "" = pool-mode idle (LAN L1)
  uint32 capacity_vus = 3;  // max VUs this worker is willing to run
  string token = 4;         // shared preshared key (LAN L1); "" = unset
  string hostname = 5;      // worker machine hostname (LAN L2 display); "" = unset
  bool stable_id = 6;       // worker_id is operator-assigned (--worker-id) → durable control (LAN ops); false = ephemeral random ULID
}

message Pong {
  uint64 nonce = 1;
}

message LoopStat {
  string step_id = 1;
  uint32 loop_index = 2;   // 4294967295 (u32::MAX) = overflow bucket (>= cap)
  uint64 count = 3;
  uint64 error_count = 4;
}

message BranchStat {
  string step_id = 1;   // the `if` node's id
  string branch = 2;    // "then" | "elif_0".. | "else" | "none"
  uint64 count = 3;     // decision count (counts-only: a branch decision has no error)
}

message GroupStat {
  string step_id = 1;        // the `parallel` node's id
  bytes hdr_histogram = 2;   // hdrhistogram V2 serialized (delta since last drain)
  uint64 count = 3;          // samples in this delta
  string branch = 4;         // "" = page (whole block), else the branch name
}

message PhaseStat {
  string step_id = 1;
  string phase = 2;          // v1: "download" only (room for dns/tcp/tls/total later)
  bytes hdr_histogram = 3;   // hdrhistogram V2 serialized (delta since last drain)
  uint64 count = 4;
}

message ActiveVuSample {
  int64 ts_second = 1;
  uint32 desired = 2;   // curve's commanded active-VU count for this second
  uint32 actual = 3;    // live VUs in their active loop at the sample instant
}

message MetricBatch {
  string run_id = 1;
  string worker_id = 2;
  repeated MetricWindow windows = 3;
  repeated LoopStat loop_stats = 4;
  repeated BranchStat branch_stats = 5;
  uint64 dropped = 6;                  // open-loop arrivals dropped (run-total carried on final flush)
  repeated GroupStat group_stats = 7;  // parallel 페이지-로드 레이턴시 (delta, controller merges)
  repeated PhaseStat phase_stats = 8;  // per-(step_id,phase) latency-phase breakdown (delta, controller merges)
  repeated ActiveVuSample active_vu_samples = 9;  // per-second active-VU gauge (curve only)
}

message MetricWindow {
  int64 ts_second = 1;
  string step_id = 2;           // scenario step id, or "_all"
  uint64 count = 3;
  uint64 error_count = 4;
  bytes hdr_histogram = 5;      // hdrhistogram V2 serialized
  map<string, uint64> status_counts = 6;
}

message RunStatus {
  string run_id = 1;
  Phase phase = 2;
  string message = 3;
  enum Phase {
    PHASE_UNSPECIFIED = 0;
    PHASE_STARTED = 1;
    PHASE_COMPLETED = 2;
    PHASE_FAILED = 3;
    PHASE_ABORTED = 4;
  }
}

// ---------- Server → Worker ----------

message ServerMessage {
  oneof payload {
    RunAssignment assignment = 1;
    AbortRun abort = 2;
    Ping ping = 3;
    DatasetBatch dataset_batch = 4;
    Disconnect disconnect = 5;   // controller asks the worker to exit cleanly (no reconnect)
  }
}

message RunAssignment {
  string run_id = 1;
  string scenario_yaml = 2;     // canonical scenario YAML, snapshotted
  Profile profile = 3;          // Profile.vus = total VUs (reference)
  map<string, string> env = 4;
  DataBinding data_binding = 5;   // DEPRECATED: 단일 바인딩(레거시). 신 컨트롤러는 data_bindings 사용.
  uint32 shard_index = 6;         // 0..shard_count-1
  uint32 shard_count = 7;         // = N (worker count)
  uint32 vu_offset = 8;           // this worker's global VU start (= RunPlan.vu_offset)
  uint32 vu_count = 9;            // VUs this worker runs (= RunPlan.vus)
  repeated DataBinding data_bindings = 10;  // 다중 독립 바인딩 (binding_index 순서)
}

message ThinkTime {
  uint32 min_ms = 1;
  uint32 max_ms = 2;
}

message Stage {
  uint32 target = 1;           // arrival rate (req/s) reached at end of this stage
  uint32 duration_seconds = 2;
}

message Profile {
  uint32 vus = 1;
  uint32 ramp_up_seconds = 2;
  uint32 duration_seconds = 3;
  uint32 loop_breakdown_cap = 4;   // 0 = disabled
  uint32 http_timeout_seconds = 5; // 0 = use default (30s)
  ThinkTime think_time = 6;        // absent → no inter-iteration pacing
  optional uint32 think_seed = 7;  // present → deterministic, absent → entropy
  optional uint32 target_rps = 8;      // present → open-loop arrival rate
  optional uint32 max_in_flight = 9;   // present → open-loop slot-pool size
  repeated Stage stages = 10;          // S-D open-loop rate curve; empty = absent (fixed rate)
  bool measure_phases = 11;            // opt-in latency-phase breakdown (TTFB+download)
  repeated Stage vu_stages = 12;       // closed-loop VU curve; target = VU count (not RPS); empty = absent (spec §3.1)
  bool ramp_down_immediate = 13;       // VU-curve ramp-down: false = graceful (default)
  optional uint32 graceful_ramp_down_seconds = 14;  // VU-curve graceful ramp-down 상한(초); 부재 = 무상한
}

message AbortRun {
  string run_id = 1;
  string reason = 2;
}

message Ping {
  uint64 nonce = 1;
}

message Disconnect {
  string reason = 1;
}

// ---------- Data binding (Slice 8c) ----------

message DataBinding {
  Policy policy = 1;
  uint32 seed = 2;        // controller folds run_id (ULID) → u32; determinism only
  uint64 row_count = 3;   // rows the worker will receive after policy-aware slicing
  enum Policy {
    PER_VU = 0;
    ITER_SEQUENTIAL = 1;
    ITER_RANDOM = 2;
    UNIQUE = 3;
  }
}

// One row with mappings already applied: keys are flow-var names, not columns.
message DatasetRow {
  map<string, string> values = 1;
}

message DatasetBatch {
  string run_id = 1;
  repeated DatasetRow rows = 2;
  uint32 binding_index = 3;   // 이 배치 행들이 몇 번째 바인딩 것인지 (단일=0)
}
