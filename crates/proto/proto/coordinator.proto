syntax = "proto3";
package handicap.coordinator.v1;

// Single bidi stream:
//   Worker  --> Register, MetricBatch, RunStatus
//   Server  --> RunAssignment, AbortRun, Pong
service Coordinator {
  rpc Channel(stream WorkerMessage) returns (stream ServerMessage);
}

// ---------- Worker → Server ----------

message WorkerMessage {
  oneof payload {
    Register register = 1;
    Pong pong = 2;
    MetricBatch metric_batch = 3;
    RunStatus run_status = 4;
  }
}

message Register {
  string worker_id = 1;
  string run_id = 2;        // worker is spawned per-run in slice 1
  uint32 capacity_vus = 3;  // max VUs this worker is willing to run
}

message Pong {
  uint64 nonce = 1;
}

message LoopStat {
  string step_id = 1;
  uint32 loop_index = 2;   // 4294967295 (u32::MAX) = overflow bucket (>= cap)
  uint64 count = 3;
  uint64 error_count = 4;
}

message BranchStat {
  string step_id = 1;   // the `if` node's id
  string branch = 2;    // "then" | "elif_0".. | "else" | "none"
  uint64 count = 3;     // decision count (counts-only: a branch decision has no error)
}

message MetricBatch {
  string run_id = 1;
  string worker_id = 2;
  repeated MetricWindow windows = 3;
  repeated LoopStat loop_stats = 4;
  repeated BranchStat branch_stats = 5;
}

message MetricWindow {
  int64 ts_second = 1;
  string step_id = 2;           // scenario step id, or "_all"
  uint64 count = 3;
  uint64 error_count = 4;
  bytes hdr_histogram = 5;      // hdrhistogram V2 serialized
  map<string, uint64> status_counts = 6;
}

message RunStatus {
  string run_id = 1;
  Phase phase = 2;
  string message = 3;
  enum Phase {
    PHASE_UNSPECIFIED = 0;
    PHASE_STARTED = 1;
    PHASE_COMPLETED = 2;
    PHASE_FAILED = 3;
    PHASE_ABORTED = 4;
  }
}

// ---------- Server → Worker ----------

message ServerMessage {
  oneof payload {
    RunAssignment assignment = 1;
    AbortRun abort = 2;
    Ping ping = 3;
    DatasetBatch dataset_batch = 4;
  }
}

message RunAssignment {
  string run_id = 1;
  string scenario_yaml = 2;     // canonical scenario YAML, snapshotted
  Profile profile = 3;          // Profile.vus = total VUs (reference)
  map<string, string> env = 4;
  DataBinding data_binding = 5;   // absent → no data injection (back-compat)
  uint32 shard_index = 6;         // 0..shard_count-1
  uint32 shard_count = 7;         // = N (worker count)
  uint32 vu_offset = 8;           // this worker's global VU start (= RunPlan.vu_offset)
  uint32 vu_count = 9;            // VUs this worker runs (= RunPlan.vus)
}

message Profile {
  uint32 vus = 1;
  uint32 ramp_up_seconds = 2;
  uint32 duration_seconds = 3;
  uint32 loop_breakdown_cap = 4;   // 0 = disabled
}

message AbortRun {
  string run_id = 1;
  string reason = 2;
}

message Ping {
  uint64 nonce = 1;
}

// ---------- Data binding (Slice 8c) ----------

message DataBinding {
  Policy policy = 1;
  uint32 seed = 2;        // controller folds run_id (ULID) → u32; determinism only
  uint64 row_count = 3;   // rows the worker will receive after policy-aware slicing
  enum Policy {
    PER_VU = 0;
    ITER_SEQUENTIAL = 1;
    ITER_RANDOM = 2;
    // UNIQUE reserved — rejected at the controller, see spec §12.
  }
}

// One row with mappings already applied: keys are flow-var names, not columns.
message DatasetRow {
  map<string, string> values = 1;
}

message DatasetBatch {
  string run_id = 1;
  repeated DatasetRow rows = 2;
}
