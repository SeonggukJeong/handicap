---
# Source: handicap/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: handicap-handicap-controller
  namespace: handicap
  labels:
    app.kubernetes.io/name: handicap
    app.kubernetes.io/instance: handicap
    app.kubernetes.io/version: "0.1.0"
    app.kubernetes.io/managed-by: Helm
    helm.sh/chart: handicap-0.1.0
    app.kubernetes.io/component: controller
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: handicap
      app.kubernetes.io/instance: handicap
      app.kubernetes.io/component: controller
  strategy:
    type: Recreate   # SQLite PV is RWO; rolling update would deadlock.
  template:
    metadata:
      labels:
        app.kubernetes.io/name: handicap
        app.kubernetes.io/instance: handicap
        app.kubernetes.io/version: "0.1.0"
        app.kubernetes.io/managed-by: Helm
        helm.sh/chart: handicap-0.1.0
        app.kubernetes.io/component: controller
    spec:
      serviceAccountName: handicap-handicap-controller
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
      containers:
        - name: controller
          image: "handicap:dev"
          imagePullPolicy: IfNotPresent
          command: ["/usr/local/bin/controller"]
          args:
            - "--db"
            - "/data/handicap.db"
            - "--rest"
            - "0.0.0.0:8080"
            - "--grpc"
            - "0.0.0.0:8081"
            - "--ui-dir"
            - "/srv/ui"
            - "--worker-mode"
            - "kubernetes"
            - "--namespace"
            - "handicap"
            - "--release-name"
            - "handicap"
            - "--worker-image"
            - "handicap:dev"
            - "--controller-grpc-url"
            - "http://handicap-handicap-controller.handicap.svc.cluster.local:8081"
            - "--worker-capacity-vus"
            - "2000"
          ports:
            - name: rest
              containerPort: 8080
            - name: grpc
              containerPort: 8081
          readinessProbe:
            httpGet:
              path: /api/health
              port: rest
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /api/health
              port: rest
            initialDelaySeconds: 10
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
              - ALL
            readOnlyRootFilesystem: true
          resources:
            limits:
              cpu: 2
              memory: 1Gi
            requests:
              cpu: 200m
              memory: 256Mi
          volumeMounts:
            - name: data
              mountPath: /data
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: handicap-handicap-controller-data
        - name: tmp
          emptyDir: {}
