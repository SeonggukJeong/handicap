nameOverride: ""
fullnameOverride: ""

image:
  repository: handicap
  tag: dev
  pullPolicy: IfNotPresent

controller:
  replicas: 1
  resources:
    requests:
      cpu: 200m
      memory: 256Mi
    limits:
      cpu: 2
      memory: 1Gi
  rest:
    port: 8080
  grpc:
    port: 8081

worker:
  # The image used by Jobs the controller creates. Defaults to the same image
  # as the controller — single image, two binaries.
  image: ""
  # Per-worker VU capacity. The controller fans a run out to
  # N = ceil(total_vus / capacityVus) Indexed-Job Pods. Default 2000 → most runs
  # are single-worker. Lower it to force fan-out. (A3c spec §2.1, §7.2.)
  capacityVus: 2000

persistence:
  enabled: true
  size: 5Gi
  storageClass: ""   # empty = use cluster default (kind: "standard")
  mountPath: /data

service:
  type: ClusterIP

serviceAccount:
  create: true
  name: ""

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 65532

containerSecurityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]
