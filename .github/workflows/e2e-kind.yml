name: e2e-kind
on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Install protoc and just
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler just
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: ui/pnpm-lock.yaml
      - uses: azure/setup-helm@v4
        with:
          version: v3.16.0
      - uses: helm/kind-action@v1.10.0
        with:
          version: v0.24.0
          cluster_name: handicap
          config: deploy/kind/cluster.yaml
          wait: 60s
      - name: Build image
        run: just build-image
      - name: Load image into kind
        run: kind load docker-image handicap:dev --name handicap
      - name: Helm install
        run: |
          kubectl create ns handicap || true
          helm upgrade --install handicap deploy/helm/handicap \
            --namespace handicap --wait --timeout 5m \
            --set worker.capacityVus=25
      - name: Run e2e driver
        run: |
          kubectl apply -f deploy/kind/wiremock.yaml
          kubectl -n handicap-test rollout status deploy/wiremock --timeout=120s
          kubectl -n handicap port-forward svc/handicap-handicap-controller 18080:8080 &
          kubectl -n handicap-test port-forward svc/wiremock 19001:8080 &
          for _ in $(seq 1 30); do curl -sf http://127.0.0.1:18080/api/health && break; sleep 1; done
          for _ in $(seq 1 30); do curl -sf http://127.0.0.1:19001/__admin/health && break; sleep 1; done
          # Background the driver so we can observe the worker Job WHILE the run is
          # live: A3c deletes the Job on completion, so a post-run assertion races
          # (and loses) against cleanup. completionMode/completions are static at
          # Job creation → capturing them mid-run is race-free; driver success then
          # proves both N=2 workers registered + completed (A3a completion gate).
          HANDICAP_BASE=http://127.0.0.1:18080 \
          WIREMOCK_ADMIN_BASE=http://127.0.0.1:19001 \
          WIREMOCK_CLUSTER_BASE=http://wiremock.handicap-test.svc.cluster.local:8080 \
          cargo run -p handicap-controller --bin e2e_kind_driver &
          DRIVER_PID=$!
          echo "==> verifying Indexed Job fan-out (N=2) while run is active"
          MODE=""; COMP=""
          for _ in $(seq 1 180); do
            JOB="$(kubectl -n handicap get jobs -l app.kubernetes.io/component=worker -o jsonpath='{.items[0].metadata.name}' 2>/dev/null || true)"
            if [ -n "$JOB" ]; then
              MODE="$(kubectl -n handicap get job "$JOB" -o jsonpath='{.spec.completionMode}' 2>/dev/null || true)"
              COMP="$(kubectl -n handicap get job "$JOB" -o jsonpath='{.spec.completions}' 2>/dev/null || true)"
              [ "$MODE" = "Indexed" ] && [ "$COMP" = "2" ] && break
            fi
            kill -0 "$DRIVER_PID" 2>/dev/null || break
            sleep 1
          done
          echo "job=${JOB:-<none>} mode=${MODE:-<none>} completions=${COMP:-<none>}"
          [ "$MODE" = "Indexed" ] && [ "$COMP" = "2" ] || { echo "Indexed fan-out assertion failed"; kill "$DRIVER_PID" 2>/dev/null || true; exit 1; }
          wait "$DRIVER_PID" || { echo "e2e driver failed"; exit 1; }
      - name: Diagnostics on failure
        if: failure()
        run: |
          kubectl -n handicap describe pods || true
          kubectl -n handicap logs deploy/handicap-handicap-controller --tail=200 || true
          kubectl -n handicap get jobs -l app.kubernetes.io/component=worker || true
